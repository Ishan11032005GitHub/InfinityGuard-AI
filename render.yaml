services:
  - type: web
    name: infinityguard-backend
    env: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: infinityguard-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: infinityguard-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        value: https://infinityguard-ml.onrender.com
  - type: web
    name: infinityguard-ml
    env: docker
    rootDir: ml-service
    plan: starter
    healthCheckPath: /health
  - type: redis
    name: infinityguard-redis
    plan: starter
databases:
  - name: infinityguard-postgres
    plan: starter
